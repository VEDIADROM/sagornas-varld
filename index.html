<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#8ed3ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sagornas värld">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Sagornas värld</title>
<style>
  :root{
    --sat: env(safe-area-inset-top, 0px);  --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px); --sar: env(safe-area-inset-right, 0px);
  }
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#aee3ff;touch-action:none;
    overscroll-behavior:none;position:fixed;inset:0;width:100%;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  canvas{display:block;position:fixed;inset:0;touch-action:none;}
  canvas:focus{outline:4px solid rgba(255,255,255,.9);outline-offset:-5px;}
  .a11y-action{position:fixed;left:-9999px;top:0;z-index:10;font:700 18px system-ui,sans-serif;
    border:3px solid #fff;border-radius:14px;padding:12px 16px;background:#512da8;color:#fff;}
  .a11y-action:focus{left:12px;top:12px;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;}
</style>
</head>
<body>
<canvas id="c" role="application" tabindex="0" aria-describedby="gameHelp"
  aria-label="Sagornas värld. Tryck Starta spelet och följ de animerade händerna."></canvas>
<p id="gameHelp" class="sr-only">Barnspel. Använd piltangenterna för att flyga och mellanslag för att hoppa.</p>
<div aria-label="Spelkontroller">
  <button id="a11yStart" class="a11y-action" type="button">Starta spelet</button>
  <button id="a11yPause" class="a11y-action" type="button">Pausa eller fortsätt</button>
  <button id="a11yMute" class="a11y-action" type="button">Ljud av eller på</button>
  <button id="a11yHome" class="a11y-action" type="button">Till startsidan</button>
  <button id="a11yCalm" class="a11y-action" type="button">Lugn flygtur</button>
  <button id="a11yComfort" class="a11y-action" type="button">Mindre rörelse</button>
</div>
<p id="gameStatus" class="sr-only" aria-live="polite"></p>
<script>
'use strict';
/* ============================================================
   SAGORNAS VÄRLD — ett sagospel för barn
   Fas 1: Himlen  – hitta 6 fåglar
   Fas 2: Rymden  – samla 10 stjärnor
   Fas 3: Marken  – hoppa förbi jätteläskiga zombisar
   ============================================================ */

const CV = document.getElementById('c');
const ctx = CV.getContext('2d');
let w = 0, h = 0, dpr = 1;
const SAFE = { t: 0, b: 0, l: 0, r: 0 };   // säkra zoner (notch/hemindikator)

function resize(){
  const oldW = w, oldH = h;
  dpr = Math.min(2, window.devicePixelRatio || 1);
  w = window.innerWidth; h = window.innerHeight;
  CV.width = Math.round(w * dpr); CV.height = Math.round(h * dpr);
  CV.style.width = w + 'px'; CV.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cs = getComputedStyle(document.documentElement);
  SAFE.t = parseFloat(cs.getPropertyValue('--sat')) || 0;
  SAFE.b = parseFloat(cs.getPropertyValue('--sab')) || 0;
  SAFE.l = parseFloat(cs.getPropertyValue('--sal')) || 0;
  SAFE.r = parseFloat(cs.getPropertyValue('--sar')) || 0;
  if (oldW > 0 && oldH > 0 && window.G){
    const g = window.G, rotated = (oldW > oldH) !== (w > h);
    g.ux = g.ux / oldW * w; g.tx = g.tx / oldW * w;
    g.uy = g.uy / oldH * h; g.ty = g.ty / oldH * h;
    g.ux = clamp(g.ux, SAFE.l + unit()*1.4, w - SAFE.r - unit()*1.4);
    g.tx = clamp(g.tx, SAFE.l + unit()*1.4, w - SAFE.r - unit()*1.4);
    if ((g.phase === 'sky' || g.phase === 'calm') && !g.flying) g.uy = g.ty = standY();
    if ((g.phase === 'ground' || g.phase === 'lose') && g.grounded) g.uy = standY();
    if (rotated && ['sky','space','ground','calm'].includes(g.phase)){
      g.paused = true;
      announce('Spelet pausades när skärmen vreds.');
    }
  }
}
window.addEventListener('resize', resize);
resize();

const TAU = Math.PI * 2;
const rnd = Math.random;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;

function unit(){ return clamp(Math.min(w, h) * 0.085, 26, 64); }   // unicorn size
function groundY(){ return h * 0.82; }
function standY(){ return groundY() - unit() * 1.18; }

/* säker lagring: spelet fungerar även om privatläge blockerar localStorage */
const memoryStore = Object.create(null);
const store = {
  get(key, fallback){
    try { const value = localStorage.getItem(key); return value == null ? fallback : value; }
    catch(e){ return key in memoryStore ? memoryStore[key] : fallback; }
  },
  set(key, value){
    memoryStore[key] = String(value);
    try { localStorage.setItem(key, String(value)); } catch(e){}
  }
};
function announce(message){
  const el = document.getElementById('gameStatus');
  if (el){ el.textContent = ''; requestAnimationFrame(() => { el.textContent = message; }); }
}

/* ---------------- ljud (Web Audio, inga filer) ---------------- */
let AC = null;
function audioInit(){
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === 'suspended') AC.resume();
  if (AC && !musicTimer) musicTimer = setInterval(musicTick, 120);
}
let muted = store.get('sagovarld_mute', '0') === '1';
let haptics = store.get('sagovarld_haptics', '1') !== '0';
let gentleMotion = store.get('sagovarld_gentle',
  window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches ? '1' : '0') === '1';
function buzz(pattern){                       // vibration där det stöds (Android)
  if (!haptics || gentleMotion) return;
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e){}
}
function tone(f, dur, type, vol, delay, slide){
  if (!AC || muted) return;
  type = type || 'sine'; vol = vol == null ? 0.12 : vol; delay = delay || 0;
  const t = AC.currentTime + delay;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, t);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, f + slide), t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
const sndTap    = () => tone(520, .07, 'triangle', .08);
const sndWings  = () => { tone(400, .25, 'sine', .1, 0, 500); tone(600, .2, 'sine', .06, .1, 400); };
const sndBird   = () => { tone(660, .12, 'triangle', .14); tone(880, .12, 'triangle', .14, .09); tone(1320, .22, 'triangle', .14, .18); };
const sndStar   = () => { tone(880, .1, 'sine', .12); tone(1175, .1, 'sine', .12, .08); tone(1568, .28, 'sine', .12, .16); };
const sndJump   = () => tone(280, .18, 'sine', .12, 0, 320);
const sndOops   = () => { tone(300, .15, 'square', .05, 0, -60); tone(200, .25, 'square', .05, .12, -60); };
const sndWhoosh = () => tone(200, .8, 'sine', .1, 0, 900);
const sndWin    = () => { [523,659,784,1047,784,1047,1319].forEach((f,i)=>tone(f,.22,'triangle',.13,i*.16)); };
const sndAlmost = () => { [523,494,440].forEach((f,i)=>tone(f,.25,'sine',.1,i*.18)); };
const sndLand   = () => tone(420, .16, 'sine', .06, 0, -220);
const sndGiggle = () => { tone(700,.07,'sine',.12); tone(920,.07,'sine',.12,.08); tone(780,.1,'sine',.12,.16,180); };
const sndBoing  = () => tone(240, .25, 'sine', .15, 0, 480);
const sndPop    = n  => tone(420 + Math.min(n,8)*70, .07, 'sine', .13);

/* mjuk bakgrundsmusik per fas (mycket låg volym) */
let musicTimer = null, nextNote = 0, noteIx = 0;
const MUSIC = {
  menu:   { seq: [523, 587, 659, 784],                     step: 0.42, type: 'triangle', vol: 0.022, bass: 131 },
  sky:    { seq: [523, 659, 784, 880, 784, 659, 587, 659], step: 0.30, type: 'triangle', vol: 0.028, bass: 131 },
  calm:   { seq: [523, 659, 784, 880, 784, 659, 587, 659], step: 0.40, type: 'sine',     vol: 0.026, bass: 131 },
  space:  { seq: [523, 494, 440, 392, 440, 494],           step: 0.50, type: 'sine',     vol: 0.026, bass: 110 },
  ground: { seq: [523, 523, 392, 440, 523, 587, 523, 440], step: 0.24, type: 'triangle', vol: 0.022, bass: 98 },
  win:    { seq: [523, 659, 784, 1047, 784, 659],          step: 0.30, type: 'triangle', vol: 0.026, bass: 131 },
};
function musicTick(){
  if (!AC || S.paused) return;
  const m = MUSIC[S.phase];
  if (!m) return;
  const t = AC.currentTime;
  if (nextNote < t) nextNote = t + 0.05;
  while (nextNote < t + 0.35){
    const f = m.seq[noteIx % m.seq.length];
    tone(f, m.step * 0.9, m.type, m.vol, nextNote - t);
    if (noteIx % m.seq.length === 0)
      tone(m.bass, m.step * m.seq.length * 0.9, 'sine', m.vol * 0.8, nextNote - t);
    nextNote += m.step; noteIx++;
  }
}

/* ---------------- speltillstånd ---------------- */
function loadLevel(){
  const v = parseInt(store.get('sagovarld_level', '1'), 10);
  return (isNaN(v) || v < 1) ? 1 : v;
}
const S = {
  phase: 'menu', time: 0, level: loadLevel(), paused: false,
  ux: 0, uy: 0, tx: 0, ty: 0, face: 1, wings: 0, flying: false, flap: 0,
  blinkT: 2.5, happyT: 0, wiggleT: 0,
  birds: [], birdsFound: 0, bigStar: false, bigStarT: 0,
  stars: [], starsFound: 0, bgStars: [],
  clouds: [], friends: [],
  courseLen: 10, p: 0, vy: 0, grounded: true, jumps: 0, hearts: 10,
  zombies: [], invulnT: 0, runT: 0,
  banner: '', bannerT: 0,
  transT: 0, particles: [], trailT: 0, winConfT: 0,
  ribbon: [], landT: 0, shakeT: 0, birdPopT: -9, starPopT: -9, heartPopT: -9,
  takeoffT: 0,
  bubbles: [], bubbleT: 3, popChain: 0, popT: -9, hats: [],
  idleT: 0, coyoteT: 0, jumpBufferT: 0, misses: 0, assist: 0, rescued: false,
  checkpointShown: false, activePointer: null,
};
/* manfärger — "måla din enhörning" */
const MANES = [
  { main:'#ff8fc6', light:'#ffaed6', pale:'#ffc7e2' },   // rosa
  { main:'#8ec9ff', light:'#b3dbff', pale:'#d6ecff' },   // blå
  { main:'#b39ddb', light:'#cbbde8', pale:'#e2d9f3' },   // lila
  { main:'#8fd08f', light:'#b5e3a8', pale:'#d4f0c9' },   // grön
  { main:'#ffd54f', light:'#ffe38a', pale:'#fff0bd' },   // gul
  { main:'#ff8a65', light:'#ffab91', pale:'#ffccbc' },   // orange
];
let maneIx = parseInt(store.get('sagovarld_mane', '0'), 10);
if (isNaN(maneIx) || maneIx < 0 || maneIx >= MANES.length) maneIx = 0;
const playerMane = () => MANES[maneIx];
window.G = S; // för test/felsökning

function makeClouds(){
  S.clouds = [];
  for (let i = 0; i < 6; i++){
    S.clouds.push({ fx: 0.08 + i * 0.16 + rnd() * 0.06, fy: 0.1 + rnd() * 0.35, s: 0.6 + rnd() * 0.7, drift: 0.004 + rnd() * 0.006 });
  }
}
function makeFriends(many){
  S.friends = [];
  const n = many ? 6 : 4;
  for (let i = 0; i < n; i++){
    const kind = i === 0 ? 'princess' : i === 1 ? 'king' : 'unicorn';
    S.friends.push({ fx: 0.06 + (i + 0.4) * (0.9 / n) + rnd()*0.04, kind, seed: rnd() * 10, cheer: 0 });
  }
}
function makeBirds(){
  S.birds = []; S.birdsFound = 0; S.bigStar = false;
  const hidden = clamp(S.level - 1, 0, 4);          // fler gömda per nivå
  const hudSize = clamp(w / 34, 9, 17);
  const top = clamp((hudSize * 5.5 + SAFE.t + unit()) / h, 0.16, 0.32);
  const cols = ['#ff7043','#42a5f5','#ffca28','#ab47bc','#66bb6a','#ec407a'];
  for (let i = 0; i < 6; i++){
    const b = { fx: 0.1 + (i + 0.5) * 0.8 / 6 + (rnd()-0.5)*0.06,
                fy: top + rnd() * (0.62 - top), col: cols[i], found: false,
                seed: rnd() * 10, cover: 'none' };
    if (i < hidden){
      if (i % 2 === 0 && S.level >= 3){ b.cover = 'tower'; b.fx = 0.12 + (i/2) * 0.1; b.fy = 0.56; }
      else { b.cover = 'cloud'; const c = S.clouds[i % S.clouds.length]; b.cloudIx = i % S.clouds.length; }
    }
    S.birds.push(b);
  }
}
function makeStars(){
  S.stars = []; S.starsFound = 0;
  const hudSize = clamp(w / 40, 8, 15);
  const top = clamp((hudSize * 5.8 + SAFE.t + unit() * 0.7) / h, 0.12, 0.28);
  for (let i = 0; i < 10; i++){
    let fx, fy, ok = false, tries = 0;
    while (!ok && tries++ < 40){
      fx = 0.08 + rnd() * 0.84; fy = top + rnd() * (0.72 - top); ok = true;
      for (const s of S.stars) if (Math.hypot((s.fx-fx)*w, (s.fy-fy)*h) < unit()*2.2) ok = false;
    }
    S.stars.push({ fx, fy, got: false, seed: rnd() * 10 });
  }
  S.bgStars = [];
  for (let i = 0; i < 90; i++) S.bgStars.push({ fx: rnd(), fy: rnd(), s: 0.5 + rnd()*1.6, seed: rnd()*10 });
}
function makeZombies(){
  S.zombies = [];
  const lvl = S.level;
  const n = lvl === 1 ? 10 : lvl === 2 ? 12 : Math.min(16, 13 + lvl - 3 + 1);
  S.courseLen = 10;
  const a = 1.6, b = S.courseLen - 1.0;
  const pool = lvl === 1 ? ['norm','bebis','somn','norm','disco','bebis']
                         : ['norm','lang','bebis','disco','somn','lang'];
  const koff = Math.floor(rnd() * pool.length);
  for (let i = 0; i < n; i++){
    const base = a + (b - a) * i / (n - 1) + (rnd() - 0.5) * 0.18;
    const kn = pool[(i + koff) % pool.length];
    const K = ZK[kn];
    S.zombies.push({
      wx: base, seed: rnd() * 10, kind: kn, k: K,
      pace: lvl >= 2 && kn !== 'somn',                                  // sovande står alltid still
      range: (lvl >= 3 ? 0.055 : 0.045) * (kn === 'bebis' ? 0.6 : 1),   // bebisar tultar kort & snabbt
      spd: (lvl >= 3 ? 1.9 : 1.2) * (kn === 'bebis' ? 1.8 : 1),
      hit: false, hitT: 0, tipDir: rnd() < 0.5 ? -1 : 1,
      say: K.say,
    });
  }
}

function go(phase){
  S.phase = phase; S.transT = 0; S.particles = []; S.ribbon = [];
  S.bubbles = []; S.bubbleT = 2.5; S.takeoffT = 0; S.idleT = 0;
  if (phase === 'menu'){
    S.level = loadLevel(); makeClouds(); makeFriends(false); S.paused = false;
    announce('Startskärm. Välj manfärg, starta sagan eller ta en lugn flygtur.');
  }
  if (phase === 'sky' || phase === 'calm'){
    makeClouds(); makeFriends(phase === 'calm');
    if (phase === 'sky') makeBirds();
    S.flying = phase === 'calm'; S.wings = phase === 'calm' ? 1 : 0;
    S.ux = w * 0.3; S.uy = phase === 'calm' ? h * 0.4 : standY();
    S.tx = S.ux; S.ty = S.uy; S.face = 1;
    announce(phase === 'calm' ? 'Lugn flygtur. Dra för att flyga och lek med vännerna.' : 'Hitta sex fåglar. Tryck på hjärtat och dra för att flyga.');
  }
  if (phase === 'toSpace'){ sndWhoosh(); }
  if (phase === 'space'){
    makeStars(); S.flying = true; S.wings = 1;
    S.ux = w/2; S.uy = h + unit()*2; S.tx = w/2; S.ty = h*0.55; S.face = 1;
    announce('Rymden. Samla tio stjärnor genom att flyga in i dem.');
  }
  if (phase === 'toGround'){ sndWhoosh(); }
  if (phase === 'ground'){
    makeZombies(); S.p = 0; S.vy = 0; S.grounded = true; S.jumps = 0;
    S.hearts = 10; S.invulnT = 0; S.wings = 0; S.flying = false; S.hats = [];
    S.uy = standY(); S.banner = 'Hoppa!'; S.bannerT = 1.6;
    S.coyoteT = 0; S.jumpBufferT = 0; S.misses = 0; S.assist = 0;
    S.rescued = false; S.checkpointShown = false;
    makeClouds();
    announce('Vägen till slottet. Tryck för att hoppa. Tryck en gång till i luften för dubbelhopp.');
  }
  if (phase === 'win'){
    sndWin(); buzz([60, 60, 140]); S.winConfT = 0;
    store.set('sagovarld_level', String(S.level + 1));
    announce('Hurra! Du klarade sagan. Välj nästa nivå eller en lugn flygtur.');
  }
  if (phase === 'lose'){ sndAlmost(); announce('Nästan! Prova igen när du vill.'); }
  syncA11y();
}

/* ---------------- partiklar ---------------- */
function confetti(x, y, n){
  if (gentleMotion) n = Math.max(3, Math.ceil(n * 0.22));
  const cols = ['#ff5c8a','#ffd54f','#4fc3f7','#81c784','#ba68c8','#ff8a65'];
  for (let i = 0; i < n; i++){
    const a = rnd() * TAU, sp = 60 + rnd() * 260;
    S.particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 120,
      c: cols[i % 6], r: 3 + rnd()*4, t: 0, life: 0.9 + rnd()*0.7, star: rnd() < 0.3 });
  }
}
function updParticles(dt){
  for (let i = S.particles.length - 1; i >= 0; i--){
    const p = S.particles[i];
    p.t += dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 420 * dt;
    if (p.t > p.life) S.particles.splice(i, 1);
  }
}
function updBubbles(dt){
  S.bubbleT -= dt;
  if (S.bubbleT <= 0){
    S.bubbleT = 5 + rnd() * 5;
    const bx = 0.15 + rnd() * 0.7, by = 0.15 + rnd() * 0.4;
    for (let i = 0; i < 5; i++)
      S.bubbles.push({ x: (bx + (rnd()-0.5)*0.14) * w, y: (by + (rnd()-0.5)*0.14) * h,
        r: unit() * (0.28 + rnd() * 0.3), vy: -8 - rnd()*12, wob: rnd()*7, t: 0 });
  }
  for (let i = S.bubbles.length - 1; i >= 0; i--){
    const b = S.bubbles[i];
    b.t += dt; b.y += b.vy * dt; b.x += Math.sin(S.time*2 + b.wob) * 12 * dt;
    if (b.t > 9 || b.y < -b.r){ S.bubbles.splice(i, 1); continue; }
    if (Math.hypot(b.x - S.ux, b.y - S.uy) < b.r + unit()*0.9){   // popp!
      S.bubbles.splice(i, 1);
      if (S.time - S.popT > 1.5) S.popChain = 0;
      S.popT = S.time; sndPop(S.popChain++); buzz(10);
      for (let j = 0; j < 6; j++)
        S.particles.push({ x: b.x, y: b.y, vx: (rnd()-0.5)*160, vy: (rnd()-0.5)*160,
          c: 'rgba(255,255,255,.9)', r: 2 + rnd()*2, t: 0, life: 0.35 });
    }
  }
}
function drawBubbles(){
  for (const b of S.bubbles){
    ctx.fillStyle = 'rgba(255,255,255,.14)';
    ctx.strokeStyle = 'rgba(255,255,255,.75)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.7)'; ell(b.x - b.r*0.35, b.y - b.r*0.4, b.r*0.2, b.r*0.12, -0.6);
  }
}
function drawRainbow(cx, cy, r0, thick, alpha){
  const cols = ['#ff5c8a','#ffb347','#ffe45c','#7ed957','#5cc8ff','#b28cff'];
  ctx.save(); ctx.globalAlpha = alpha == null ? 0.9 : alpha; ctx.lineCap = 'butt';
  for (let i = 0; i < cols.length; i++){
    ctx.strokeStyle = cols[i]; ctx.lineWidth = thick;
    ctx.beginPath(); ctx.arc(cx, cy, r0 - i * thick, Math.PI, TAU); ctx.stroke();
  }
  ctx.restore();
}
function drawRibbon(){
  const cols = ['#ff5c8a','#ffb347','#ffe45c','#7ed957','#5cc8ff','#b28cff'];
  const n = S.ribbon.length;
  if (n < 3) return;
  ctx.save(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.globalAlpha = 0.6; ctx.lineWidth = unit() * 0.12;
  for (let c = 0; c < cols.length; c++){
    const off = (c - (cols.length - 1) / 2) * unit() * 0.1;
    ctx.strokeStyle = cols[c];
    ctx.beginPath();
    for (let i = 0; i < n; i++){
      const p = S.ribbon[i];
      i ? ctx.lineTo(p.x, p.y + off) : ctx.moveTo(p.x, p.y + off);
    }
    ctx.stroke();
  }
  ctx.restore();
}
function drawParticles(){
  for (const p of S.particles){
    ctx.globalAlpha = clamp(1 - p.t / p.life, 0, 1);
    ctx.fillStyle = p.c;
    if (p.star){ starPath(p.x, p.y, p.r * 1.6, p.t * 4); ctx.fill(); }
    else if (p.heart){ heartPath(p.x, p.y, p.r * 1.6); ctx.fill(); }
    else { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill(); }
  }
  ctx.globalAlpha = 1;
}

/* ---------------- ritprimitiver ---------------- */
function circle(x, y, r){ ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); }
function ell(x, y, rx, ry, rot){ ctx.beginPath(); ctx.ellipse(x, y, rx, ry, rot || 0, 0, TAU); ctx.fill(); }
function rr(x, y, ww, hh, r){ ctx.beginPath(); ctx.roundRect(x, y, ww, hh, r); ctx.fill(); }
function starPath(x, y, r, rot){
  rot = (rot || 0) - Math.PI / 2;
  ctx.beginPath();
  for (let i = 0; i < 10; i++){
    const a = rot + i * Math.PI / 5, rr2 = i % 2 ? r * 0.45 : r;
    const px = x + Math.cos(a) * rr2, py = y + Math.sin(a) * rr2;
    i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
  }
  ctx.closePath();
}
function heartPath(x, y, s){
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.42);
  ctx.bezierCurveTo(x - s * 0.95, y - s * 0.22, x - s * 0.52, y - s * 0.95, x, y - s * 0.32);
  ctx.bezierCurveTo(x + s * 0.52, y - s * 0.95, x + s * 0.95, y - s * 0.22, x, y + s * 0.42);
  ctx.closePath();
}
function txt(t, x, y, size, col, stroke){
  ctx.font = 'bold ' + size + 'px "Comic Sans MS","Segoe UI",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (stroke){ ctx.lineWidth = size * 0.18; ctx.strokeStyle = stroke; ctx.lineJoin = 'round'; ctx.strokeText(t, x, y); }
  ctx.fillStyle = col; ctx.fillText(t, x, y);
}

function drawWing(x, y, s, flapT, front){
  const a = -0.55 + Math.sin(flapT) * 0.55;
  ctx.save(); ctx.translate(x, y); ctx.rotate(a * (front ? 1 : 0.85));
  ctx.fillStyle = front ? '#ffffff' : '#ecdff2';
  ctx.strokeStyle = '#e2aed3'; ctx.lineWidth = s * 0.055;
  for (let i = 0; i < 3; i++){
    ctx.beginPath();
    ctx.ellipse(-0.35*s - i*0.3*s, -0.5*s + i*0.1*s, 0.58*s - i*0.09*s, 0.24*s, -0.55 - i*0.28, 0, TAU);
    ctx.fill(); ctx.stroke();
  }
  ctx.fillStyle = front ? '#ffd3e8' : '#e3c6dd';
  for (let i = 0; i < 3; i++){
    ell(-0.62*s - i*0.28*s, -0.62*s + i*0.06*s, 0.2*s, 0.1*s, -0.6 - i*0.3);
  }
  ctx.restore();
}
function drawUnicorn(x, y, u, o){

                   [0.45,0.32,0.14],[-0.12,-0.5,0.18],[1.3,-0.72,0.12],[-1.15,0.02,0.13],[0.9,-0.12,0.17]];

    }
  }
  if (wings > 0.03) drawWing(-0.05*u, -0.6*u, u * (0.35 + 0.65*wings), flap + 0.5, true);
  ctx.restore();
}

function drawCastle(x, gy, s, towersOut){
  // x = mitt, gy = marknivå, s = skala. towersOut: fyll i tornpositioner
  const W = 260 * s, H = 150 * s;
  ctx.save();
  ctx.fillStyle = '#cfd0e8';
  rr(x - W/2, gy - H, W, H, 6*s);                                 // mur
  ctx.fillStyle = '#bcbdd8';
  for (let i = 0; i < 6; i++) rr(x - W/2 + 8*s + i * (W-16*s)/5.4, gy - H - 16*s, 26*s, 18*s, 3*s); // krenelering
  const tw = 62 * s, tx = [x - W/2 - tw*0.4, x, x + W/2 - tw*0.6];
  for (let i = 0; i < 3; i++){
    const txx = tx[i], th = (i === 1 ? 250 : 200) * s;
    ctx.fillStyle = '#dddef0'; rr(txx, gy - th, tw, th, 6*s);      // torn
    ctx.fillStyle = '#f06292';                                     // tak
    ctx.beginPath(); ctx.moveTo(txx - 10*s, gy - th);
    ctx.lineTo(txx + tw + 10*s, gy - th); ctx.lineTo(txx + tw/2, gy - th - 70*s);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#e91e63'; ctx.lineWidth = 3*s;              // flagga
    ctx.beginPath(); ctx.moveTo(txx + tw/2, gy - th - 70*s); ctx.lineTo(txx + tw/2, gy - th - 100*s); ctx.stroke();
    ctx.fillStyle = '#ffca28';
    const fw = Math.sin(S.time * 3 + i) * 6 * s;
    ctx.beginPath(); ctx.moveTo(txx + tw/2, gy - th - 100*s);
    ctx.lineTo(txx + tw/2 + 30*s, gy - th - 92*s + fw); ctx.lineTo(txx + tw/2, gy - th - 84*s);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#7986cb'; rr(txx + tw/2 - 8*s, gy - th + 26*s, 16*s, 26*s, 8*s); // fönster
    if (towersOut) towersOut.push({ x: txx + tw/2, y: gy - th - 20*s });
  }
  ctx.fillStyle = '#8d6e63';                                       // port
  ctx.beginPath(); ctx.moveTo(x - 26*s, gy); ctx.lineTo(x - 26*s, gy - 56*s);
  ctx.arc(x, gy - 56*s, 26*s, Math.PI, 0); ctx.lineTo(x + 26*s, gy); ctx.closePath(); ctx.fill();
  ctx.restore();
}

  if (!gentleMotion && !z.hit){
    ctx.fillStyle = '#29102f'; ctx.globalAlpha = 0.2;
    for (let i = 0; i < 3; i++){
      const drift = Math.sin(S.time*(0.7+i*0.18) + z.seed + i) * zu*0.35;
      ell(sx + drift, gy - zu*(0.45 + i*0.58), zu*(0.34-i*0.05), zu*0.22);
    }
  }
  ctx.restore();
  ctx.save(); ctx.globalAlpha = 0.48; ctx.fillStyle = '#0b0710';
  ell(sx, gy - 2, zu * 1.04, zu * 0.22); ctx.restore();
  ctx.save(); ctx.translate(sx, gy - zu * 1.1);
  if (!gentleMotion && !z.hit) ctx.translate(Math.sin(S.time*18 + z.seed) * zu*0.018, 0);
  if (bt < 0.35){ const k = 1 - bt/0.35; ctx.scale(1 + 0.25*k, 1 - 0.3*k); ctx.translate(0, zu*0.3*k); }  // glad studsmatta-squash
  if (z.hit) ctx.rotate(z.tipDir * clamp(t * 2.2, 0, 1) * 1.15);
  else if (K.dance) ctx.rotate(Math.sin(S.time * 5 + z.seed) * 0.15);
  else if (K.sleepy && !awake) ctx.rotate(Math.sin(S.time * 1.2 + z.seed) * 0.03);
  else ctx.rotate(Math.sin(S.time * (K.scale < 0.8 ? 6 : 3) + z.seed) * 0.06);
  // ben
  ctx.fillStyle = K.leg;
  rr(-0.45*zu, 0.7*zu, 0.32*zu, 0.42*zu, 0.13*zu); rr(0.13*zu, 0.7*zu, 0.32*zu, 0.42*zu, 0.13*zu);
  ctx.fillStyle = '#c7b883';
  for (const side of [-1, 1]){
    const footX = side < 0 ? -0.38*zu : 0.38*zu;
    ctx.beginPath(); ctx.moveTo(footX-side*0.13*zu, 1.08*zu); ctx.lineTo(footX+side*0.2*zu, 1.08*zu); ctx.lineTo(footX+side*0.08*zu, 0.94*zu); ctx.closePath(); ctx.fill();
  }
  // kropp + mage
  ctx.fillStyle = K.body; ell(0, cy, 0.8*zu*(th > 1 ? 0.85 : 1), 0.88*zu*th);
  ctx.strokeStyle = '#0d1010'; ctx.lineWidth = 0.1*zu;
  ctx.beginPath(); ctx.ellipse(0, cy, 0.8*zu*(th > 1 ? 0.85 : 1), 0.88*zu*th, 0, 0, TAU); ctx.stroke();
  ctx.fillStyle = K.belly; ell(0, cy + 0.23*zu, 0.5*zu, 0.5*zu);
  // taggig rygg och trasig silhuett
  ctx.fillStyle = '#111819';
  for (const side of [-1, 1]){
    ctx.beginPath(); ctx.moveTo(side*0.55*zu, cy-0.55*zu); ctx.lineTo(side*1.02*zu, cy-0.5*zu); ctx.lineTo(side*0.7*zu, cy-0.16*zu); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(side*0.67*zu, cy+0.02*zu); ctx.lineTo(side*1.04*zu, cy+0.16*zu); ctx.lineTo(side*0.66*zu, cy+0.34*zu); ctx.closePath(); ctx.fill();
  }
  // armar (disco viftar i luften)
  ctx.fillStyle = K.body;
  if (K.dance){
    const wave = Math.sin(S.time * 6 + z.seed) * 0.4;
    ell(-0.62*zu, cy - 0.55*zu, 0.3*zu, 0.15*zu, -1 - wave); ell(0.62*zu, cy - 0.55*zu, 0.3*zu, 0.15*zu, 1 + wave);
  } else {
    ell(-0.72*zu*(th > 1 ? 0.85 : 1), cy - 0.12*zu, 0.3*zu, 0.16*zu, 0.5);
    ell(0.72*zu*(th > 1 ? 0.85 : 1), cy - 0.12*zu, 0.3*zu, 0.16*zu, -0.5);
  }
  // långa klor längst ut på armarna
  ctx.strokeStyle = '#d4c58d'; ctx.lineWidth = 0.055*zu; ctx.lineCap = 'round';
  for (const side of [-1, 1]){
    const clawX = side*0.92*zu, clawY = K.dance ? cy-0.68*zu : cy-0.02*zu;
    for (let i = -1; i <= 1; i++){
      ctx.beginPath(); ctx.moveTo(clawX, clawY+i*0.08*zu); ctx.lineTo(clawX+side*(0.2+Math.abs(i)*0.03)*zu, clawY+(i*0.12+0.04)*zu); ctx.stroke();
    }
  }
  // huvud med stark övernaturlig glöd och nästan svart kontur
  ctx.save();
  ctx.shadowColor = K.eye; ctx.shadowBlur = gentleMotion ? 5 : 18;
  ctx.fillStyle = K.head; ctx.strokeStyle = '#0b0710'; ctx.lineWidth = 0.11*zu;
  ctx.beginPath(); ctx.arc(0, hy, hr2, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.restore();
  // långa, krokiga horn och trasiga öron
  ctx.fillStyle = '#b9a46f'; ctx.strokeStyle = '#211323'; ctx.lineWidth = 0.07*zu; ctx.lineJoin = 'round';
  for (const side of [-1, 1]){
    ctx.beginPath();
    ctx.moveTo(side*0.28*zu, hy-0.37*zu); ctx.lineTo(side*0.52*zu, hy-0.98*zu);
    ctx.lineTo(side*0.7*zu, hy-0.7*zu); ctx.lineTo(side*0.47*zu, hy-0.82*zu);
    ctx.lineTo(side*0.05*zu, hy-0.43*zu); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = K.head;
    ctx.beginPath(); ctx.moveTo(side*0.42*zu, hy-0.05*zu); ctx.lineTo(side*0.78*zu, hy-0.3*zu); ctx.lineTo(side*0.62*zu, hy+0.12*zu); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#b9a46f';
  }
  // ögon
  if (z.hit){
    ctx.fillStyle = '#fff'; circle(-0.2*zu, hy - 0.1*zu, 0.19*zu); circle(0.22*zu, hy - 0.07*zu, 0.14*zu);
    ctx.fillStyle = '#f9a825';
    starPath(-0.2*zu, hy - 0.1*zu, 0.1*zu, t*6); ctx.fill();
    starPath(0.22*zu, hy - 0.07*zu, 0.08*zu, -t*6); ctx.fill();
  } else if (K.sleepy && !awake){
    ctx.strokeStyle = '#5e35b1'; ctx.lineWidth = 0.05*zu; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(-0.2*zu, hy - 0.08*zu, 0.13*zu, 0.15, Math.PI - 0.15);
    ctx.moveTo(0.35*zu, hy - 0.05*zu); ctx.arc(0.22*zu, hy - 0.05*zu, 0.13*zu, 0.15, Math.PI - 0.15);
    ctx.stroke();
  } else {
    ctx.save(); ctx.shadowColor = K.eye; ctx.shadowBlur = gentleMotion ? 6 : 22;
    ctx.fillStyle = '#efe8cf'; ell(-0.21*zu, hy - 0.09*zu, 0.22*zu, 0.19*zu); ell(0.23*zu, hy - 0.06*zu, 0.18*zu, 0.16*zu);
    ctx.fillStyle = K.eye;
    const look = Math.sin(S.time * 1.7 + z.seed) * 0.045 * zu;
    ell(-0.21*zu + look, hy - 0.07*zu, 0.1*zu, 0.12*zu); ell(0.23*zu + look, hy - 0.05*zu, 0.08*zu, 0.1*zu);
    ctx.fillStyle = '#08040a';
    ell(-0.21*zu + look, hy - 0.07*zu, 0.027*zu, 0.09*zu); ell(0.23*zu + look, hy - 0.05*zu, 0.023*zu, 0.075*zu);
    ctx.restore();
    // tunga V-formade ögonbryn
    ctx.strokeStyle = '#0a060c'; ctx.lineWidth = 0.13*zu; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-0.46*zu, hy-0.35*zu); ctx.lineTo(-0.06*zu, hy-0.18*zu);
    ctx.moveTo(0.06*zu, hy-0.18*zu); ctx.lineTo(0.46*zu, hy-0.35*zu); ctx.stroke();
  }
  // näsborrar och stor gapande mun med två rader ojämna tänder
  ctx.fillStyle = '#100a13'; ell(-0.08*zu, hy+0.09*zu, 0.035*zu, 0.025*zu); ell(0.08*zu, hy+0.09*zu, 0.035*zu, 0.025*zu);
  if (K.sleepy && !awake){
    ctx.strokeStyle = K.mouth; ctx.lineWidth = 0.06*zu; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(0.02*zu, hy + 0.22*zu, 0.07*zu, 0, TAU); ctx.stroke();
  } else {
    ctx.fillStyle = K.mouth; ctx.strokeStyle = '#050306'; ctx.lineWidth = 0.06*zu;
    ctx.beginPath(); ctx.ellipse(0, hy + 0.27*zu, 0.36*zu, 0.25*zu, 0, 0, TAU); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff8dc';
    for (let i = -2; i <= 2; i++){
      const toothX = i*0.125*zu;
      ctx.beginPath(); ctx.moveTo(toothX-0.055*zu, hy+0.07*zu); ctx.lineTo(toothX+0.055*zu, hy+0.07*zu); ctx.lineTo(toothX+0.018*zu, hy+0.24*zu+(i%2)*0.025*zu); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(toothX-0.055*zu, hy+0.47*zu); ctx.lineTo(toothX+0.055*zu, hy+0.47*zu); ctx.lineTo(toothX-0.015*zu, hy+0.3*zu-(i%2)*0.025*zu); ctx.closePath(); ctx.fill();
    }
  }
  // djupa ansiktssprickor och sydd kind
  ctx.strokeStyle = '#100916'; ctx.lineWidth = 0.045*zu; ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.moveTo(-0.38*zu, hy-0.02*zu); ctx.lineTo(-0.49*zu, hy+0.12*zu); ctx.lineTo(-0.38*zu, hy+0.17*zu); ctx.lineTo(-0.5*zu, hy+0.31*zu);
  ctx.moveTo(0.3*zu, hy+0.02*zu); ctx.lineTo(0.48*zu, hy+0.18*zu);
  ctx.moveTo(0.35*zu, hy+0.08*zu); ctx.lineTo(0.31*zu, hy+0.15*zu);
  ctx.moveTo(0.42*zu, hy+0.12*zu); ctx.lineTo(0.38*zu, hy+0.2*zu); ctx.stroke();
  ctx.restore();
  // Zzz som svävar upp från den sovande
  if (K.sleepy && !awake && !z.hit){
    const zt = (S.time * 0.7 + z.seed) % 1;
    ctx.globalAlpha = 1 - zt;
    txt('z', sx + zu*0.8, gy - zu*1.1 + hy - zu*(0.7 + zt*0.9), zu*(0.35 + zt*0.25), '#7986cb');
    ctx.globalAlpha = 1;
  }
  // hatt (kan flyga av — och plockas upp av enhörningen!)
  if (!z.hatTaken){
    let hx = sx, hhy = gy - zu * 1.1 + hy - hr2 * 0.85, hrot = 0;
    if (z.hit){
      const ht = Math.min(t, 0.8);
      hx += z.tipDir * -1 * ht * zu * 1.6;
      hhy += -ht * zu * 3 + ht * ht * zu * 5.2;
      hrot = t * 5 * z.tipDir;
      if (t > 0.8) { hhy = gy - 0.18 * zu; hrot = z.tipDir * 2.6; }
    } else if (bt < 0.5){ hhy -= Math.sin(bt / 0.5 * Math.PI) * zu * 0.9; hrot = bt * 9; }  // hatten snurrar vid studs
    ctx.save(); ctx.translate(hx, hhy); ctx.rotate(hrot);
    drawHatShape(K.hat, zu);
    ctx.restore();
  }
  // pratbubbla
  if (z.hit && t < 1.5){
    const bx = sx, by = gy - zu * 1.1 + hy - zu * 1.6;
    ctx.globalAlpha = clamp(1.5 - t, 0, 1);
    ctx.fillStyle = '#fff';
    rr(bx - zu*1.1, by - zu*0.45, zu*2.2, zu*0.9, zu*0.45);
    ctx.beginPath(); ctx.moveTo(bx - zu*0.2, by + zu*0.4); ctx.lineTo(bx + zu*0.25, by + zu*0.4); ctx.lineTo(bx, by + zu*0.75); ctx.closePath(); ctx.fill();
    txt(z.say, bx, by + zu*0.02, zu*0.5, '#5d4037');
    ctx.globalAlpha = 1;
  }
}

/* ---------------- knappar ---------------- */
function btnR(){ return clamp(Math.min(w, h) * 0.085, 40, 64); }
function playBtn(){ return { x: w/2, y: h * 0.62, r: btnR() * 1.25 }; }
function menuCalmBtn(){ return { x: Math.max(btnR()*1.35, w*0.16), y: h * 0.64, r: btnR() * 0.72 }; }
function comfortBtn(){ const b = muteBtn(); return { x: b.x + b.r * 2.45, y: b.y, r: b.r }; }
function resumeBtn(){ return { x:w/2, y:h*.4, r:btnR()*1.25 }; }
function homeBtn(){ return { x: w * 0.35, y: Math.min(h * 0.64, h - SAFE.b - btnR()*2.15), r: btnR() * 0.82 }; }
function restartBtn(){ return { x: w * 0.65, y: Math.min(h * 0.64, h - SAFE.b - btnR()*2.15), r: btnR() * 0.82 }; }
function winNextBtn(){ const r = btnR() * 1.05; return { x: w * 0.72, y: Math.min(h * 0.76, h - SAFE.b - r * 1.75), r }; }
function drawArrowBtn(x, y, r, label){
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.25)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 4;
  ctx.fillStyle = '#43a047'; circle(x, y, r);
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  ctx.fillStyle = '#2e7d32'; ctx.lineWidth = r*0.1;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.moveTo(x - r*0.28, y - r*0.42); ctx.lineTo(x + r*0.5, y); ctx.lineTo(x - r*0.28, y + r*0.42); ctx.closePath(); ctx.fill();
  ctx.restore();
  if (label) txt(label, x, y + r * 1.55, Math.max(16, r * 0.42), '#2e7d32', '#fff');
}
function drawHandBtn(x, y, r){
  ctx.fillStyle = '#6a4bb5'; circle(x, y, r);
  ctx.fillStyle = '#fff';
  rr(x-r*.34, y-r*.42, r*.22, r*.84, r*.08);
  rr(x+r*.12, y-r*.42, r*.22, r*.84, r*.08);
}
function drawIconBtn(b, icon, color, label){
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.2)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
  ctx.fillStyle = color; circle(b.x, b.y, b.r);
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  ctx.font = Math.round(b.r*0.95) + 'px "Segoe UI Emoji",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(icon, b.x, b.y + b.r*0.04);
  ctx.restore();
  if (label) txt(label, b.x, b.y + b.r*1.48, Math.max(14, b.r*.4), '#4a355d', '#fff');
}
function pauseBtn(){ const r = btnR() * 0.7; return { x: w - r - 12 - SAFE.r, y: r + 12 + SAFE.t, r }; }
function muteBtn(){ const r = btnR() * 0.7; return { x: r + 12 + SAFE.l, y: r + 12 + SAFE.t, r }; }
function drawMuteBtn(){
  const b = muteBtn();
  ctx.fillStyle = '#7e57c2'; circle(b.x, b.y, b.r);
  ctx.font = Math.round(b.r * 0.95) + 'px "Segoe UI Emoji",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(muted ? '🔇' : '🔊', b.x, b.y + b.r * 0.06);
}
function drawComfortBtn(){
  const b = comfortBtn();
  drawIconBtn(b, gentleMotion ? '🌙' : '✨', gentleMotion ? '#397d68' : '#f6a623', 'Lugnare');
}
function toggleMute(){
  muted = !muted;
  store.set('sagovarld_mute', muted ? '1' : '0');
  if (!muted) sndTap();
  announce(muted ? 'Ljudet är av.' : 'Ljudet är på.');
}
function toggleGentle(){
  gentleMotion = !gentleMotion; store.set('sagovarld_gentle', gentleMotion ? '1' : '0');
  announce(gentleMotion ? 'Lugnare rörelser är på.' : 'Alla rörelser är på.');
}
function hitCircle(px, py, c){ return Math.hypot(px - c.x, py - c.y) <= c.r * 1.25; }

/* ---------------- räknare (HUD) ---------------- */
function popScale(popT, active){       // 1 → 1.55 → 1 under 0.35 s
  if (!active) return 1;
  const d = S.time - popT;
  return d < 0.35 ? 1 + (0.35 - d) / 0.35 * 0.55 : 1;
}
function drawBirdHUD(){
  const s = clamp(w / 34, 9, 17), gap = s * 4.6;
  const x0 = w/2 - gap * 2.5;
  for (let i = 0; i < 6; i++){
    const sc = popScale(S.birdPopT, i === S.birdsFound - 1);
    drawBird(x0 + i * gap, s * 2.2 + SAFE.t, s * sc, S.birds[i] ? S.birds[i].col : '#ff7043', S.time + i, i >= S.birdsFound);
  }
  txt(S.birdsFound + '/6', w/2, s * 4.7 + SAFE.t, Math.max(14, s*1.3), '#5d4037', '#fff');
}
function drawStarHUD(){
  const s = clamp(w / 40, 8, 15), gap = s * 2.9;
  const x0 = w/2 - gap * 4.5;
  for (let i = 0; i < 10; i++){
    const sc = popScale(S.starPopT, i === S.starsFound - 1);
    ctx.fillStyle = i < S.starsFound ? '#ffd54f' : 'rgba(255,255,255,.25)';
    starPath(x0 + i * gap, s * 2.4 + SAFE.t, s * 1.1 * sc, 0); ctx.fill();
    if (i < S.starsFound){ ctx.strokeStyle = '#ffb300'; ctx.lineWidth = 1.5; ctx.stroke(); }
  }
  txt(S.starsFound + '/10', w/2, s * 5 + SAFE.t, Math.max(14, s*1.35), '#fff', '#29145f');
}
function drawHeartHUD(){
  const s = clamp(w / 38, 8, 16), gap = s * 2.6;
  const x0 = w/2 - gap * 4.5;
  for (let i = 0; i < 10; i++){
    const full = i < S.hearts;
    const sc = popScale(S.heartPopT, i === S.hearts);   // hjärtat som just tömdes studsar till
    ctx.fillStyle = full ? '#ff3d77' : 'rgba(255,255,255,.6)';
    heartPath(x0 + i * gap, s * 2.4 + SAFE.t, s * 1.15 * sc); ctx.fill();
    ctx.strokeStyle = full ? '#d81b60' : '#c5b0ba'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}
function drawProgress(){
  // liten bildbaserad karta: enhörningsprick som rör sig mot mini-slottet
  const y = clamp(w / 38, 8, 16) * 4.6 + SAFE.t, x0 = w * 0.22, x1 = w * 0.78;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.75)'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
  ctx.fillStyle = '#dddef0'; rr(x1 - 7, y - 15, 14, 15, 2);
  ctx.fillStyle = '#f06292';
  ctx.beginPath(); ctx.moveTo(x1 - 10, y - 15); ctx.lineTo(x1 + 10, y - 15); ctx.lineTo(x1, y - 26); ctx.closePath(); ctx.fill();
  const fx = x0 + (x1 - x0) * clamp(S.p / (S.courseLen - 0.55), 0, 1);
  ctx.fillStyle = '#ffffff'; circle(fx, y, 7);
  ctx.fillStyle = '#f2b90c';
  ctx.beginPath(); ctx.moveTo(fx - 2, y - 5); ctx.lineTo(fx + 2, y - 5); ctx.lineTo(fx, y - 13); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff8fc6'; circle(fx - 4, y - 2, 3);
  ctx.restore();
}

/* ---------------- ordlös spelcoach ---------------- */
function birdScreenPos(b){
  if (b.cover === 'cloud'){
    const c = S.clouds[b.cloudIx]; return { x:(c.fx + 0.06) * w, y:c.fy * h };
  }
  return { x:b.fx * w, y:b.fy * h };
}
function nearestBirdPos(){
  let best = null, bestD = Infinity;
  for (const b of S.birds){
    if (b.found) continue;
    const p = birdScreenPos(b), d = Math.hypot(p.x-S.ux, p.y-S.uy);
    if (d < bestD){ best = p; bestD = d; }
  }
  return best;
}
function nearestStarPos(){
  let best = null, bestD = Infinity;
  for (const st of S.stars){
    if (st.got) continue;
    const p = { x:st.fx*w, y:st.fy*h }, d = Math.hypot(p.x-S.ux, p.y-S.uy);
    if (d < bestD){ best = p; bestD = d; }
  }
  return best;
}
function nextZombiePos(){
  const heroX = w * 0.26;
  for (const z of S.zombies){
    if (z.hit) continue;
    const off = z.pace ? Math.sin(S.time*z.spd+z.seed)*z.range : 0;
    const x = (z.wx + off - S.p) * w + heroX;
    if (x > heroX + unit()*.7) return { x, y:groundY()-unit()*1.2 };
  }
  return null;
}
function drawTapCoach(x, y){
  const slowT = gentleMotion ? 0 : S.time;
  const pulse = 1 + Math.sin(slowT * 5) * 0.14;
  ctx.save();
  ctx.globalAlpha = 0.82;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 5;
  circleStroke(x, y, unit() * (0.75 + (S.time % 1) * 0.55));
  ctx.font = Math.round(unit()*1.05*pulse) + 'px "Segoe UI Emoji",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('👆', x + unit()*.18, y + unit()*1.15);
  ctx.restore();
}
function circleStroke(x, y, r){ ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.stroke(); }
function drawDragCoach(x1, y1, x2, y2){
  const t = gentleMotion ? 0.55 : (S.time * 0.38) % 1;
  ctx.save(); ctx.globalAlpha = 0.78;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.setLineDash([8,12]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo((x1+x2)/2, Math.min(y1,y2)-unit(), x2,y2); ctx.stroke();
  ctx.setLineDash([]);
  const cx = lerp(x1,x2,t), cy = lerp(y1,y2,t) - Math.sin(t*Math.PI)*unit();
  ctx.font = Math.round(unit()*.95) + 'px "Segoe UI Emoji",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('👆', cx, cy);
  ctx.strokeStyle = '#ffd54f'; ctx.lineWidth = 4; circleStroke(x2,y2,unit()*(.75+Math.sin(S.time*4)*.12));
  ctx.restore();
}
function drawJumpGuide(){
  const z = nextZombiePos(); if (!z || z.x > w + unit()*2) return;
  const x1 = w*.26, y1 = standY(), x2 = z.x + unit()*.8, y2 = standY();
  ctx.save(); ctx.globalAlpha = .62; ctx.strokeStyle = '#fff'; ctx.lineWidth = 6; ctx.setLineDash([10,12]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo((x1+x2)/2, y1-unit()*3.6, x2,y2); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}
function drawCoach(){
  if (S.paused) return;
  if (S.phase === 'sky'){
    if (S.bigStar){ const b = bigStarBtn(); drawTapCoach(b.x,b.y); return; }
    if (!S.flying){ const b = heartBtnPos(); drawTapCoach(b.x,b.y); return; }
    if (S.birdsFound === 0 || S.idleT > 6){ const p = nearestBirdPos(); if (p) drawDragCoach(S.ux,S.uy,p.x,p.y); }
  } else if (S.phase === 'space' && (S.starsFound === 0 || S.idleT > 6)){
    const p = nearestStarPos(); if (p) drawDragCoach(S.ux,S.uy,p.x,p.y);
  } else if (S.phase === 'ground' && (S.bannerT > 0 || S.p < 1.15 || S.assist)){
    drawJumpGuide(); drawTapCoach(w*.78, h*.67);
  }
}

function setFlyTarget(px, py, pointerType){
  S.tx = px;
  S.ty = py - (pointerType === 'touch' ? clamp(unit()*1.55, 56, 90) : 0);
}

/* ---------------- fysik & logik ---------------- */
function deployWings(){
  S.flying = true; sndWings();
  S.takeoffT = 1.0;                      // lyftfas: kan inte råka landa direkt igen
  S.ty = S.uy - h * 0.3; S.tx = S.ux;
}
function jump(){
  S.jumpBufferT = 0.14;
  if (S.grounded || S.coyoteT > 0){
    S.jumpBufferT = 0; S.vy = -h * 1.18; S.grounded = false; S.jumps = 1; S.coyoteT = 0; sndJump();
  } else if (S.jumps < 2){
    S.jumpBufferT = 0; S.vy = -h * 1.05; S.jumps = 2; sndJump();
  }
}
function flyUpdate(dt, minY){
  S.wings = lerp(S.wings, S.flying ? 1 : 0, clamp(dt * 4, 0, 1));
  S.flap += dt * (S.flying ? 9 : 2);
  if (!S.flying){ if (S.ribbon.length) S.ribbon.splice(0, 2); return; }
  if (S.takeoffT > 0){
    S.takeoffT -= dt;
    S.ty = Math.min(S.ty, standY() - h * 0.22);   // under lyftfasen stiger den alltid
  }
  S.ribbon.push({ x: S.ux - S.face * unit() * 1.2, y: S.uy - unit() * 0.05 });
  if (S.ribbon.length > 24) S.ribbon.shift();
  const k = clamp(dt * 4.5, 0, 1);
  S.ux = lerp(S.ux, S.tx, k); S.uy = lerp(S.uy, S.ty, k);
  S.ux = clamp(S.ux, SAFE.l + unit()*1.4, w - SAFE.r - unit()*1.4);
  S.uy = clamp(S.uy, minY, standY());
  if (Math.abs(S.tx - S.ux) > unit()*0.4) S.face = S.tx > S.ux ? 1 : -1;
  // sagoglitter efter enhörningen
  S.trailT += dt;
  if (S.trailT > 0.08){
    S.trailT = 0;
    S.particles.push({ x: S.ux - S.face*unit()*1.2, y: S.uy + (rnd()-.5)*unit()*0.6,
      vx: -S.face*20, vy: -10 + rnd()*20, c: ['#ffd54f','#ff8fc6','#81d4fa'][Math.floor(rnd()*3)],
      r: 2 + rnd()*2.5, t: 0, life: 0.7, star: true });
  }
}
function landCheck(){
  if (S.takeoffT > 0) return;            // hinner alltid lyfta innan landning kan ske
  if (S.flying && S.ty >= standY() - unit()*0.3 && S.uy >= standY() - unit()*0.35){
    S.flying = false; S.uy = standY();   // vingarna fälls in automatiskt
    sndLand();
    for (let i = 0; i < 5; i++)
      S.particles.push({ x: S.ux + (rnd()-0.5)*unit()*1.6, y: groundY() - 4,
        vx: (rnd()-0.5)*120, vy: -rnd()*60, c: '#e9e4ee', r: 2.5 + rnd()*3, t: 0, life: 0.4 });
  }
}
function tickle(x, y){
  sndGiggle(); buzz(15);
  for (let i = 0; i < 7; i++)
    S.particles.push({ x: x + (rnd()-0.5)*unit(), y: y - rnd()*unit()*0.8,
      vx: (rnd()-0.5)*80, vy: -50 - rnd()*90, c: i % 2 ? '#ff5c8a' : '#ff8fc6',
      r: 4 + rnd()*3, t: 0, life: 0.9, heart: true });
}
function friendAt(px, py){
  return S.friends.find(f => Math.hypot(f.fx * w - px, (groundY() - unit()*0.8) - py) < unit() * 1.4);
}
function cheerFriends(){
  for (const f of S.friends){
    const near = Math.abs(f.fx * w - S.ux) < w * 0.16 && S.uy > h * 0.35;
    f.cheer = near ? 1 : Math.max(0, f.cheer - 0.02);
  }
}

function update(dt){
  S.time += dt;
  S.idleT += dt;
  if (S.happyT > 0) S.happyT -= dt;
  if (S.wiggleT > 0) S.wiggleT -= dt;
  S.blinkT -= dt;
  if (S.blinkT < -0.14) S.blinkT = 2.2 + rnd() * 3;
  if (S.bannerT > 0) S.bannerT -= dt;
  updParticles(dt);

  switch (S.phase){
    case 'menu': break;

    case 'sky': {
      flyUpdate(dt, unit() * 1.5);
      landCheck();
      cheerFriends();
      updBubbles(dt);
      for (const c of S.clouds){ c.fx += c.drift * dt; if (c.fx > 1.15) c.fx = -0.15; }
      if (S.flying){
        for (const b of S.birds){
          if (b.found) continue;
          const bx = b.cover === 'cloud' ? (S.clouds[b.cloudIx].fx + 0.06) * w : b.fx * w;
          const by = b.cover === 'cloud' ? S.clouds[b.cloudIx].fy * h : b.fy * h;
          if (Math.hypot(bx - S.ux, by - S.uy) < unit() * 1.5){
            b.found = true; S.birdsFound++; S.happyT = 0.7; S.birdPopT = S.time;
            S.idleT = 0;
            sndBird(); buzz(25); confetti(bx, by, 26);
            announce('Fågel ' + S.birdsFound + ' av 6 hittad.');
            if (S.birdsFound >= 6){ S.bigStar = true; S.bigStarT = S.time; sndStar(); announce('Alla fåglar är hittade. Tryck på den stora stjärnan.'); }
          }
        }
      }
      break;
    }
    case 'toSpace': {
      S.transT += dt / 1.7;
      S.flap += dt * 14;
      S.uy = lerp(S.uy, -unit() * 3, clamp(dt * 1.8, 0, 1));
      S.ux = lerp(S.ux, w * 0.5, clamp(dt * 2, 0, 1));
      if (S.transT >= 1) go('space');
      break;
    }
    case 'space': {
      flyUpdate(dt, unit() * 1.2);
      updBubbles(dt);
      for (const st of S.stars){
        if (st.got) continue;
        if (Math.hypot(st.fx * w - S.ux, st.fy * h - S.uy) < unit() * 1.6){
          st.got = true; S.starsFound++; S.happyT = 0.7; S.starPopT = S.time;
          S.idleT = 0;
          sndStar(); buzz(25); confetti(st.fx * w, st.fy * h, 22);
          announce('Stjärna ' + S.starsFound + ' av 10 samlad.');
          if (S.starsFound >= 10) go('toGround');
        }
      }
      break;
    }
    case 'toGround': {
      S.transT += dt / 1.9;
      S.flap += dt * 10;
      const hx = w / 2, hy = h * 0.92;
      S.ux = lerp(S.ux, hx, clamp(dt * 2.2, 0, 1));
      S.uy = lerp(S.uy, hy, clamp(dt * 1.6, 0, 1));
      S.wings = lerp(S.wings, 0, clamp(S.transT * 1.2, 0, 1));
      if (S.transT >= 1) go('ground');
      break;
    }
    case 'ground': {
      if (S.bannerT <= 0){
        const baseSpd = S.level === 1 ? 0.185 : S.level === 2 ? 0.2 : 0.22;
        const spd = baseSpd * (S.assist ? 0.78 : 1);   // hjälpvingar sänker tempot diskret
        S.p += spd * dt;
      }
      if (S.jumpBufferT > 0) S.jumpBufferT -= dt;
      if (S.grounded) S.coyoteT = 0.12; else S.coyoteT = Math.max(0, S.coyoteT - dt);
      S.runT = (S.runT || 0) + dt * 2.2;
      S.flap += dt * (S.grounded ? 5 : 14);       // vingarna fladdrar, extra vid hopp
      // hoppfysik
      S.vy += h * 2.3 * dt;
      S.uy += S.vy * dt;
      if (S.uy >= standY()){
        if (!S.grounded){                       // landning: puff + squash
          S.landT = 0.14; sndLand();
          for (let i = 0; i < 6; i++)
            S.particles.push({ x: w*0.26 + (rnd()-0.5)*unit()*1.4, y: groundY() - 4,
              vx: (rnd()-0.5)*140, vy: -rnd()*70, c: '#e9e4ee', r: 2.5 + rnd()*3, t: 0, life: 0.4 });
        }
        S.uy = standY(); S.vy = 0; S.grounded = true; S.jumps = 0;
        if (S.jumpBufferT > 0){
          S.jumpBufferT = 0; S.vy = -h * 1.18; S.grounded = false; S.jumps = 1; sndJump();
        }
      }
      if (S.invulnT > 0) S.invulnT -= dt;
      if (S.landT > 0) S.landT -= dt;
      if (S.shakeT > 0) S.shakeT -= dt;
      for (const c of S.clouds){ c.fx += 0.01 * dt; if (c.fx > 1.15) c.fx = -0.15; }
      if (!S.checkpointShown && S.p > S.courseLen * .5){
        S.checkpointShown = true; S.banner = '⭐ Halvvägs! ⭐'; S.bannerT = 1.2; S.happyT = 1;
        sndStar(); confetti(w*.5,h*.32,24); announce('Halvvägs till slottet!');
      }
      // zombisar
      const heroX = w * 0.26;
      for (const z of S.zombies){
        const off = z.pace && !z.hit ? Math.sin(S.time * z.spd + z.seed) * z.range : 0;
        const sx = (z.wx + off - S.p) * w + heroX;
        const K = z.k || ZK.norm;
        const zu = unit() * 0.85 * K.scale;
        // plocka upp tappad hatt från marken
        if (z.hit && !z.hatTaken && S.time - z.hitT > 0.85){
          const hx = sx - z.tipDir * 1.28 * zu;
          if (Math.abs(hx - heroX) < unit() * 0.9 && S.uy > standY() - unit()){
            z.hatTaken = true; S.hats.push(K.hat);
            sndStar(); buzz(15); confetti(hx, groundY() - zu * 0.4, 10);
          }
        }
        if (z.hit) continue;
        const feet = S.uy + unit() * 1.18;
        const zTop = groundY() - zu * (1.6 + ((K.tall || 1) - 1) * 1.7);   // långa kräver högre hopp
        const overlapX = Math.abs(sx - heroX) < (unit() * 0.7 + zu * 0.7) * 0.55;
        if (overlapX && S.vy > 60 && feet < zTop + zu * 0.6 && feet > zTop - zu * 0.4){
          // snäll huvudstuds — zombien blir en fnittrig studsmatta!
          S.vy = -h * 0.95; S.jumps = 1; z.boingT = S.time;
          sndBoing(); sndGiggle(); buzz(20);
          confetti(sx, zTop, 12);
          continue;
        }
        if (overlapX && feet > zTop && S.invulnT <= 0){
          z.hit = true; z.hitT = S.time; S.hearts--; S.misses++;
          if (S.misses >= 2 && !S.assist){
            S.assist = 1; S.banner = '✨ 🪽 ✨'; S.bannerT = 1.8;
            announce('Hjälpvingar visar vägen och gör tempot lugnare.');
          }
          S.invulnT = S.assist ? 1.8 : 1.0;
          S.heartPopT = S.time; S.shakeT = 0.22;
          for (let i = 0; i < 10; i++){                     // slajmsplash!
            const a = -Math.PI * rnd();
            S.particles.push({ x: heroX, y: S.uy, vx: Math.cos(a) * (60 + rnd()*160),
              vy: Math.sin(a) * (80 + rnd()*140), c: i % 2 ? '#7cc454' : '#96d666',
              r: 3 + rnd()*4, t: 0, life: 0.5 + rnd()*0.3 });
          }
          sndOops(); buzz(70);
          if (S.hearts <= 0){
            if (!S.rescued){
              S.rescued = true; S.assist = 2; S.hearts = 3; S.invulnT = 3;
              S.banner = '🪽 💖 🪽'; S.bannerT = 2.2; sndWings(); confetti(heroX,S.uy,32);
              announce('En sagofe hjälpte till. Du fick tre nya hjärtan.');
            } else { go('lose'); return; }
          }
        }
      }
      if (S.phase === 'ground' && S.p >= S.courseLen - 0.55) go('win');
      break;
    }
    case 'win': {
      S.winConfT += dt;
      if (S.winConfT > (gentleMotion ? 0.9 : 0.25)){
        S.winConfT = 0; confetti(rnd() * w, -10, 5);
        if (!gentleMotion && rnd() < 0.3) confetti(w * (0.15 + rnd() * 0.7), h * (0.12 + rnd() * 0.3), 32);  // fyrverkeri
      }
      break;
    }
    case 'calm': {
      flyUpdate(dt, unit() * 1.5);
      landCheck();
      cheerFriends();
      updBubbles(dt);
      for (const c of S.clouds){ c.fx += c.drift * dt; if (c.fx > 1.15) c.fx = -0.15; }
      break;
    }
  }
}

/* ---------------- rendering ---------------- */
function skyGradient(topCol, botCol){
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, topCol); g.addColorStop(1, botCol);
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
}
function drawAsphalt(scrollPx){
  const gy = groundY();
  ctx.fillStyle = '#5c5f66'; ctx.fillRect(0, gy, w, h - gy);
  ctx.fillStyle = '#6b6e76'; ctx.fillRect(0, gy, w, 6);
  // mittlinje
  ctx.fillStyle = '#f4e04d';
  const dash = 46, gap = 34, off = scrollPx % (dash + gap);
  for (let x = -off; x < w; x += dash + gap) ctx.fillRect(x, gy + (h - gy) * 0.45, dash, 6);
  // små stenar
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  const per = 90, o2 = scrollPx % per;
  for (let x = -o2, i = 0; x < w + per; x += per, i++){
    const k = Math.floor((x + scrollPx) / per);
    circle(x, gy + 14 + ((k * 37) % 40), 2.5);
    circle(x + 40, gy + 30 + ((k * 53) % 30), 2);
  }
}
function drawUnicornWorld(o){
  const blink = S.blinkT < 0;
  drawUnicorn(S.ux, S.uy, unit(), Object.assign({
    face: S.face, wings: S.wings, flap: S.flap,
    blink, happy: S.happyT > 0, mane: playerMane(), crown: true,
  }, o || {}));
}
function drawSkyScene(withBirds){
  skyGradient('#8ed3ff', '#dff4ff');
  drawSun();
  const gy = groundY();
  // mark (asfalt även här)
  ctx.fillStyle = '#5c5f66'; ctx.fillRect(0, gy, w, h - gy);
  ctx.fillStyle = '#6b6e76'; ctx.fillRect(0, gy, w, 6);
  // fåglar bakom torn → slott → fåglar bakom moln → moln → öppna fåglar
  const towers = [];
  if (withBirds) for (const b of S.birds){
    if (!b.found && b.cover === 'tower'){
      const peek = Math.sin(S.time * 1.5 + b.seed) * unit() * 0.25;
      drawBird(b.fx * w, b.fy * h + peek, unit() * 0.42, b.col, S.time + b.seed);
    }
  }
  drawCastle(w * 0.24, gy, Math.min(w, h) / 640 + 0.35, towers);
  for (const f of S.friends) drawFriend(f);
  if (withBirds) for (const b of S.birds){
    if (!b.found && b.cover === 'cloud'){
      const c = S.clouds[b.cloudIx];
      const peek = Math.sin(S.time * 1.6 + b.seed) * unit() * 0.3;
      drawBird((c.fx + 0.06) * w + peek, c.fy * h, unit() * 0.42, b.col, S.time + b.seed);
    }
  }
  for (const c of S.clouds) drawCloud(c.fx * w, c.fy * h, c.s * Math.min(w, h) / 560);
  if (withBirds) for (const b of S.birds){
    if (!b.found && b.cover === 'none'){
      const bob = Math.sin(S.time * 2 + b.seed) * 8;
      drawBird(b.fx * w, b.fy * h + bob, unit() * 0.45, b.col, S.time + b.seed);
    }
  }
}
function drawSpaceBg(alpha){
  ctx.globalAlpha = alpha == null ? 1 : alpha;
  skyGradient('#070a24', '#141a3d');
  for (const st of S.bgStars){
    const tw = 0.4 + 0.6 * Math.abs(Math.sin(S.time * 1.5 + st.seed));
    ctx.fillStyle = 'rgba(255,255,255,' + (tw * (alpha == null ? 1 : alpha)).toFixed(2) + ')';
    circle(st.fx * w, st.fy * h, st.s);
  }
  // gullig måne
  const mx = w * 0.85, my = h * 0.14, mr = Math.min(w, h) * 0.05;
  ctx.fillStyle = '#fff9c4'; circle(mx, my, mr);
  ctx.fillStyle = '#f0e9a8'; circle(mx - mr*0.35, my - mr*0.2, mr*0.14); circle(mx + mr*0.3, my + mr*0.3, mr*0.1);
  ctx.fillStyle = '#3d2b3f'; circle(mx - mr*0.25, my - 0, mr*0.06); circle(mx + mr*0.25, my - 0, mr*0.06);
  ctx.strokeStyle = '#3d2b3f'; ctx.lineWidth = mr*0.06; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(mx, my + mr*0.2, mr*0.22, 0.3, Math.PI - 0.3); ctx.stroke();
  ctx.globalAlpha = 1;
}
function drawBigStar(){
  const x = w - btnR() * 1.3, y = h * 0.32;
  const pulse = 1 + Math.sin(S.time * 4) * 0.12;
  const r = btnR() * 1.05 * pulse;
  ctx.save();
  ctx.shadowColor = '#ffd54f'; ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffd54f'; starPath(x, y, r, S.time * 0.5); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff59d'; starPath(x, y, r * 0.55, S.time * 0.5); ctx.fill();
  ctx.restore();
  return { x, y, r: r * 1.2 };
}
function bigStarBtn(){ return { x: w - btnR() * 1.3, y: h * 0.32, r: btnR() * 1.35 }; }

function render(){
  ctx.clearRect(0, 0, w, h);
  const gy = groundY();

  switch (S.phase){
    case 'menu': {
      drawSkyScene(false);
      const bob = Math.sin(S.time * 2) * 6;
      drawUnicorn(w * 0.75, standY() + bob * 0.2, unit() * 1.2,
        { face: -1, blink: S.blinkT < 0, happy: S.happyT > 0 || Math.sin(S.time) > 0, mane: playerMane(), crown: true });
      drawPalette();
      const titleSize = clamp(Math.min(w,h) * 0.085, 30, 72);
      txt('Sagornas värld', w/2, h * 0.2, titleSize, '#ff5c9d', '#ffffff');
      txt('⭐ 🦄 ⭐', w/2, h * 0.2 + titleSize * 0.95, clamp(titleSize*.52, 18, 34), '#fff');
      const start = playBtn(); drawArrowBtn(start.x, start.y, start.r, '');
      txt('Nivå ' + S.level, w/2, start.y - start.r * 1.55, clamp(Math.min(w,h)*0.04, 16, 26), '#5d4037', '#fff');
      drawIconBtn(menuCalmBtn(), '💗', '#ec7cab', 'Flyg fritt');
      drawMuteBtn();
      drawComfortBtn();
      break;
    }
    case 'sky': case 'calm': {
      drawSkyScene(S.phase === 'sky');
      drawBubbles();
      drawRibbon();
      drawUnicornWorld();
      if (!S.flying && S.wings < 0.2) drawHeartBtn();
      drawParticles();
      if (S.phase === 'sky'){ drawBirdHUD(); if (S.bigStar) drawBigStar(); }
      if (S.phase === 'calm'){
        drawArrowBtn(w - btnR()*1.1 - SAFE.r, h - btnR()*1.4 - SAFE.b, btnR() * 0.9, '');
      }
      drawCoach();
      const pb = pauseBtn(); drawHandBtn(pb.x, pb.y, pb.r);
      break;
    }
    case 'toSpace': {
      drawSkyScene(false);
      drawSpaceBg(clamp(S.transT * 1.3, 0, 1));
      drawUnicornWorld();
      drawParticles();
      break;
    }
    case 'space': {
      drawSpaceBg();
      for (const st of S.stars){
        if (st.got) continue;
        const p2 = 1 + Math.sin(S.time * 3 + st.seed) * 0.15;
        const by = st.fy * h + Math.sin(S.time * 1.7 + st.seed) * 8;   // svävar mjukt
        ctx.save(); ctx.shadowColor = '#ffd54f'; ctx.shadowBlur = 16;
        ctx.fillStyle = '#ffd54f'; starPath(st.fx * w, by, unit() * 0.55 * p2, st.seed); ctx.fill();
        ctx.fillStyle = '#fff59d'; starPath(st.fx * w, by, unit() * 0.3 * p2, st.seed); ctx.fill();
        ctx.restore();
      }
      drawBubbles();
      drawRibbon();
      drawUnicornWorld();
      drawParticles();
      drawStarHUD();
      drawCoach();
      const pb = pauseBtn(); drawHandBtn(pb.x, pb.y, pb.r);
      break;
    }
    case 'toGround': {
      drawSpaceBg();
      // hålet
      const hr = clamp(S.transT * 2, 0, 1) * Math.min(w, h) * 0.16;
      ctx.save(); ctx.shadowColor = '#80d8ff'; ctx.shadowBlur = 40;
      ctx.fillStyle = '#0a0f2e'; ell(w/2, h * 0.95, hr * 1.4, hr * 0.5);
      ctx.strokeStyle = '#80d8ff'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.ellipse(w/2, h * 0.95, hr * 1.4, hr * 0.5, 0, 0, TAU); ctx.stroke();
      ctx.restore();
      drawUnicornWorld();
      if (S.transT > 0.75){
        ctx.fillStyle = 'rgba(255,255,255,' + clamp((S.transT - 0.75) * 4, 0, 1) + ')';
        ctx.fillRect(0, 0, w, h);
      }
      break;
    }
    case 'ground': case 'lose': {
      ctx.save();
      if (S.shakeT > 0 && !gentleMotion){
        const m = S.shakeT / 0.22 * 4;
        ctx.translate((rnd() - 0.5) * m * 2, (rnd() - 0.5) * m);
      }
      skyGradient('#8ed3ff', '#dff4ff');
      drawSun();
      for (const c of S.clouds) drawCloud(c.fx * w, c.fy * h * 0.5 + h*0.05, c.s * Math.min(w, h) / 620);
      const heroX = w * 0.26;
      // slottet vid mål
      const castleSx = (S.courseLen - S.p) * w + heroX;
      if (castleSx < w + 400) drawCastle(castleSx, gy, Math.min(w, h) / 640 + 0.3);
      drawAsphalt(S.p * w);
      for (const z of S.zombies){
        const off = z.pace && !z.hit ? Math.sin(S.time * z.spd + z.seed) * z.range : 0;
        const sx = (z.wx + off - S.p) * w + heroX;
        if (sx > -unit()*3 && sx < w + unit()*3) drawZombie(z, sx, unit());
      }
      const flash = !gentleMotion && S.invulnT > 0 && Math.floor(S.time * 4) % 2 === 0;
      if (!flash || S.phase === 'lose'){
        let sxq = 1, syq = 1;
        if (!S.grounded){ syq = 1.07; sxq = 0.95; }               // sträcks ut i luften
        if (S.landT > 0){ const k = S.landT / 0.14; syq = 1 - 0.16*k; sxq = 1 + 0.14*k; }  // trycks ihop vid landning
        drawUnicorn(heroX, S.uy + (syq < 1 ? unit()*(1-syq)*1.2 : 0), unit(), {
          face: 1, wings: S.grounded ? 0.35 : 1, flap: S.flap,
          run: S.grounded ? S.runT : null,
          blink: S.blinkT < 0, happy: S.happyT > 0, sx: sxq, sy: syq,
          slime: 10 - S.hearts, hats: S.hats, mane: playerMane(), crown: true,
        });
      }
      drawParticles();
      drawHeartHUD();
      if (S.phase === 'ground') drawProgress();
      if (S.phase === 'ground'){
        const pb = pauseBtn(); drawHandBtn(pb.x, pb.y, pb.r);
        drawCoach();
        if (S.bannerT > 0) txt(S.banner, w/2, h * 0.4, clamp(w*0.08, 30, 60), '#ff5c9d', '#fff');
      }
      if (S.phase === 'lose'){
        ctx.fillStyle = 'rgba(255,255,255,.78)'; ctx.fillRect(0, 0, w, h);
        txt('Nästan!', w/2, h * 0.3, clamp(w*0.09, 34, 70), '#ff5c9d', '#fff');
        txt('Prova igen!', w/2, h * 0.42, clamp(w*0.06, 24, 46), '#5d4037', '#fff');
        drawArrowBtn(w/2, h * 0.62, btnR() * 1.3, '');
      }
      ctx.restore();
      break;
    }
    case 'win': {
      skyGradient('#a5d8ff', '#ffe9f4');
      drawSun();
      drawRainbow(w/2, gy, Math.min(w, h) * 0.62, Math.min(w, h) * 0.035, 0.85);   // stor regnbåge över slottet
      drawCastle(w/2, gy, Math.min(w, h) / 520 + 0.4);
      ctx.fillStyle = '#5c5f66'; ctx.fillRect(0, gy, w, h - gy);
      for (const f of S.friends){ f.cheer = 1; drawFriend(f); }                     // kompisarna jublar
      drawUnicorn(w/2, gy - unit() * 1.3, unit() * 1.25, {
        face: 1, crown: true, happy: true, wings: 0.5, flap: S.time * 2,
        hats: S.hats, mane: playerMane(),
      });
      // samlade stjärnor
      const s = clamp(w / 30, 10, 20), gap = s * 2.5, x0 = w/2 - gap * 4.5;
      for (let i = 0; i < 10; i++){
        ctx.fillStyle = '#ffd54f';
        starPath(x0 + i * gap, h * 0.16, s, Math.sin(S.time * 2 + i) * 0.3); ctx.fill();
        ctx.strokeStyle = '#ffb300'; ctx.lineWidth = 2; ctx.stroke();
      }
      txt('Hurra!', w/2, h * 0.08, clamp(w*0.07, 28, 54), '#ff5c9d', '#fff');
      drawParticles();
      const nb = winNextBtn(); drawArrowBtn(nb.x, nb.y, nb.r, 'Nästa nivå');
      // lugnt läge-knapp (rosa moln med hjärta)
      const cb = calmBtn();
      ctx.fillStyle = '#f8bbd0'; circle(cb.x, cb.y, cb.r);
      ctx.fillStyle = '#fff';
      circle(cb.x - cb.r*0.35, cb.y + cb.r*0.15, cb.r*0.32); circle(cb.x + cb.r*0.35, cb.y + cb.r*0.15, cb.r*0.3); circle(cb.x, cb.y - cb.r*0.05, cb.r*0.4);
      ctx.fillStyle = '#ff3d77'; heartPath(cb.x, cb.y + cb.r*0.05, cb.r*0.35); ctx.fill();
      txt('Flyg fritt', cb.x, cb.y + cb.r * 1.55, Math.max(15, cb.r * 0.42), '#ad1457', '#fff');
      break;
    }
  }

  if (S.paused){
    ctx.fillStyle = 'rgba(20,30,60,.55)'; ctx.fillRect(0, 0, w, h);
    drawUnicorn(w/2, h * 0.18, unit() * 0.95,        // förhandsvisning som byter färg direkt
      { face: 1, happy: true, wings: 0.6, flap: S.time * 3, mane: playerMane(), crown: true });
    const rb = resumeBtn(); drawArrowBtn(rb.x, rb.y, rb.r, 'Fortsätt');
    drawIconBtn(homeBtn(), '🏠', '#42a5f5', 'Hem');
    drawIconBtn(restartBtn(), '🔄', '#ff9f43', 'Börja om');
    drawPalette();
    drawMuteBtn();
    drawComfortBtn();
    drawParticles();
  }
}
function calmBtn(){ const r = btnR() * 1.05; return { x: w * 0.28, y: Math.min(h * 0.76, h - SAFE.b - r * 1.75), r }; }
function paletteDots(){
  const r = clamp(w * 0.032, 15, 26), gap = r * 2.8;
  const x0 = w/2 - gap * (MANES.length - 1) / 2, y = h - r * 2 - SAFE.b;
  return MANES.map((m, i) => ({ x: x0 + i * gap, y, r, i }));
}
function drawPalette(){
  for (const d of paletteDots()){
    const sel = d.i === maneIx;
    const rr2 = d.r * (sel ? 1.25 : 1) * (sel ? 1 + Math.sin(S.time*4)*0.05 : 1);
    if (sel){ ctx.fillStyle = '#ffffff'; circle(d.x, d.y, rr2 + 4); }
    ctx.fillStyle = MANES[d.i].main; circle(d.x, d.y, rr2);
    ctx.fillStyle = MANES[d.i].light; circle(d.x - rr2*0.3, d.y - rr2*0.3, rr2*0.35);
  }
}

/* ---------------- inmatning ---------------- */
function restartCurrent(){
  const phase = S.phase === 'ground' || S.phase === 'lose' ? 'ground' :
    S.phase === 'calm' ? 'calm' : 'sky';
  S.paused = false; sndTap(); go(phase);
}
function syncA11y(){
  const active = ['sky','space','ground','calm'].includes(S.phase);
  document.getElementById('a11yStart').hidden = !['menu','lose','win'].includes(S.phase);
  document.getElementById('a11yPause').hidden = !active;
  document.getElementById('a11yHome').hidden = S.phase === 'menu';
  document.getElementById('a11yCalm').hidden = !['menu','win'].includes(S.phase);
}
function onDown(px, py, pointerType){
  audioInit();
  S.idleT = 0;
  if (S.paused){
    if (hitCircle(px, py, muteBtn())){ toggleMute(); return; }
    if (hitCircle(px, py, comfortBtn())){ toggleGentle(); return; }
    const dot = paletteDots().find(d => Math.hypot(px - d.x, py - d.y) < d.r * 1.9);
    if (dot){                                        // byt färg mitt i spelet!
      maneIx = dot.i; store.set('sagovarld_mane', String(maneIx));
      sndStar(); buzz(15); confetti(dot.x, dot.y, 10);
      return;
    }
    if (hitCircle(px, py, homeBtn())){ sndTap(); S.paused = false; go('menu'); return; }
    if (hitCircle(px, py, restartBtn())){ restartCurrent(); return; }
    if (hitCircle(px, py, resumeBtn())){ S.paused = false; sndTap(); announce('Spelet fortsätter.'); syncA11y(); }
    return;
  }
  const pb = pauseBtn();
  switch (S.phase){
    case 'menu': {
      if (hitCircle(px, py, muteBtn())){ toggleMute(); break; }
      if (hitCircle(px, py, comfortBtn())){ toggleGentle(); break; }
      if (hitCircle(px, py, menuCalmBtn())){ sndTap(); go('calm'); break; }
      const dot = paletteDots().find(d => Math.hypot(px - d.x, py - d.y) < d.r * 1.9);
      if (dot){                                   // måla din enhörning
        maneIx = dot.i; store.set('sagovarld_mane', String(maneIx));
        sndTap(); confetti(dot.x, dot.y, 8); break;
      }
      if (Math.hypot(px - w*0.75, py - standY()) < unit() * 2.4){   // kittla enhörningen
        S.happyT = 1; tickle(px, py); break;
      }
      if (hitCircle(px, py, playBtn())){ sndTap(); go('sky'); }
      break;
    }
    case 'sky':
      if (hitCircle(px, py, pb)){ S.paused = true; sndTap(); return; }
      if (S.bigStar && hitCircle(px, py, bigStarBtn())){ sndStar(); go('toSpace'); return; }
      if (!S.flying){
        // generöst: hela enhörningen räknas som hjärtknapp
        if (hitCircle(px, py, heartBtnPos()) || Math.hypot(px - S.ux, py - S.uy) < unit() * 1.9) deployWings();
        else if (friendAt(px, py)){ friendAt(px, py).cheer = 1; tickle(px, py); }
        else S.wiggleT = 0.6;                     // ledtråd: hjärtat vickar
      } else {
        const f = friendAt(px, py); if (f){ f.cheer = 1; tickle(px, py); }
        setFlyTarget(px, py, pointerType);
      }
      break;
    case 'space':
      if (hitCircle(px, py, pb)){ S.paused = true; sndTap(); return; }
      setFlyTarget(px, py, pointerType);
      break;
    case 'ground':
      if (hitCircle(px, py, pb)){ S.paused = true; sndTap(); return; }
      S.bannerT = 0; jump();
      break;
    case 'lose':
      if (hitCircle(px, py, { x: w/2, y: h * 0.62, r: btnR() * 1.3 })){ sndTap(); go('ground'); }
      break;
    case 'win':
      if (hitCircle(px, py, winNextBtn())){
        sndTap(); S.level = loadLevel(); go('sky');
      } else if (hitCircle(px, py, calmBtn())){ sndTap(); go('calm'); }
      break;
    case 'calm':
      if (hitCircle(px, py, pb)){ S.paused = true; sndTap(); return; }
      if (hitCircle(px, py, { x: w - btnR()*1.1 - SAFE.r, y: h - btnR()*1.4 - SAFE.b, r: btnR() * 0.9 })){
        sndTap(); S.level = loadLevel(); go('sky'); return;
      }
      if (!S.flying){
        if (hitCircle(px, py, heartBtnPos()) || Math.hypot(px - S.ux, py - S.uy) < unit() * 1.9) deployWings();
        else if (friendAt(px, py)){ friendAt(px, py).cheer = 1; tickle(px, py); }
        else S.wiggleT = 0.6;
      } else {
        const f = friendAt(px, py); if (f){ f.cheer = 1; tickle(px, py); }
        setFlyTarget(px, py, pointerType);
      }
      break;
  }
}
function onMove(px, py, pointerType){
  if ((S.phase === 'sky' || S.phase === 'space' || S.phase === 'calm') && S.flying && !S.paused){
    setFlyTarget(px, py, pointerType);
  }
}
CV.addEventListener('pointerdown', e => {
  if (!e.isPrimary) return;
  e.preventDefault(); S.activePointer = e.pointerId;
  try { CV.setPointerCapture(e.pointerId); } catch(err){}
  onDown(e.clientX, e.clientY, e.pointerType);
}, { passive: false });
CV.addEventListener('pointermove', e => {
  if (!e.isPrimary || (e.pointerType !== 'mouse' && e.pointerId !== S.activePointer)) return;
  onMove(e.clientX, e.clientY, e.pointerType);
});
function releasePointer(e){ if (e.pointerId === S.activePointer) S.activePointer = null; }
CV.addEventListener('pointerup', releasePointer);
CV.addEventListener('pointercancel', releasePointer);
CV.addEventListener('lostpointercapture', releasePointer);
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.code === 'Escape' || e.code === 'KeyP'){
    if (['sky','space','ground','calm'].includes(S.phase)){ S.paused = !S.paused; sndTap(); syncA11y(); }
    return;
  }
  if (e.code === 'KeyM'){ toggleMute(); return; }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code) && ['sky','space','calm'].includes(S.phase)){
    e.preventDefault(); audioInit();
    if (!S.flying) deployWings();
    const step = unit()*2.4;
    if (e.code === 'ArrowLeft') S.tx -= step;
    if (e.code === 'ArrowRight') S.tx += step;
    if (e.code === 'ArrowUp') S.ty -= step;
    if (e.code === 'ArrowDown') S.ty += step;
    S.tx = clamp(S.tx, SAFE.l+unit()*1.4, w-SAFE.r-unit()*1.4);
    S.ty = clamp(S.ty, unit()*1.2, standY()); S.idleT = 0;
    return;
  }
  if (e.code === 'Space' || e.code === 'Enter'){
    e.preventDefault(); audioInit();
    if (S.paused){ S.paused = false; return; }
    if (S.phase === 'menu') go('sky');
    else if (S.phase === 'ground'){ S.bannerT = 0; jump(); }
    else if (S.phase === 'lose') go('ground');
    else if (S.phase === 'win'){ S.level = loadLevel(); go('sky'); }
    else if ((S.phase === 'sky' || S.phase === 'calm') && !S.flying) deployWings();
  }
});
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());

document.getElementById('a11yStart').addEventListener('click', () => {
  audioInit();
  if (S.phase === 'menu') go('sky');
  else if (S.phase === 'lose') go('ground');
  else if (S.phase === 'win'){ S.level = loadLevel(); go('sky'); }
});
document.getElementById('a11yPause').addEventListener('click', () => {
  if (['sky','space','ground','calm'].includes(S.phase)){
    S.paused = !S.paused; if (!S.paused) audioInit(); syncA11y();
    announce(S.paused ? 'Spelet är pausat.' : 'Spelet fortsätter.');
  }
});
document.getElementById('a11yMute').addEventListener('click', toggleMute);
document.getElementById('a11yHome').addEventListener('click', () => go('menu'));
document.getElementById('a11yCalm').addEventListener('click', () => { audioInit(); go('calm'); });
document.getElementById('a11yComfort').addEventListener('click', toggleGentle);

document.addEventListener('visibilitychange', () => {
  if (document.hidden){
    if (['sky','space','ground','calm'].includes(S.phase)) S.paused = true;
    if (AC && AC.state === 'running') AC.suspend();
  }
  last = 0; syncA11y();
});

/* ---------------- huvudloop ---------------- */
makeClouds(); makeFriends(false);   // så att menyn har moln & kompisar direkt
let last = 0;
syncA11y();
function loop(ts){
  if (w !== window.innerWidth || h !== window.innerHeight) resize();
  const dt = Math.min(0.033, (ts - last) / 1000 || 0.016);
  last = ts;
  if (!S.paused) update(dt);
  else { S.time += dt; updParticles(dt); }   // pausskärmen lever: pulsande palett, konfetti
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* PWA: offline + installerbar på hemskärmen */
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost'))
  navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
